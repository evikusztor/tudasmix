<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>IT English B2 – Modul platform (demo)</title>

    <!-- React 18 UMD -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (JSX a böngészőben) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1220;
        color: #eaf0ff;
      }
      a { color: inherit; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .topbar {
        display: flex; gap: 12px; align-items: center; justify-content: space-between;
        padding: 16px 18px; border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.04); border-radius: 16px;
        position: sticky; top: 12px; backdrop-filter: blur(10px);
      }
      .brand { display:flex; gap:10px; align-items:center; }
      .logo {
        width: 38px; height: 38px; border-radius: 12px;
        background: linear-gradient(135deg, #7c3aed, #06b6d4);
      }
      .title { font-weight: 700; letter-spacing: .2px; }
      .muted { color: rgba(234,240,255,.7); font-size: 13px; }
      .grid { display: grid; grid-template-columns: 320px 1fr; gap: 18px; margin-top: 18px; }
      @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } .topbar{position:static;} }

      .card {
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.04);
        border-radius: 16px;
        padding: 16px;
      }
      .card h3 { margin: 0 0 8px; font-size: 16px; }
      .list { display:flex; flex-direction:column; gap:10px; }
      .item {
        padding: 12px; border-radius: 14px;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.03);
        cursor: pointer;
        display:flex; gap:12px; align-items:flex-start; justify-content:space-between;
      }
      .item:hover { background: rgba(255,255,255,.06); }
      .item[aria-disabled="true"] { opacity: .55; cursor: not-allowed; }
      .pill {
        font-size: 12px; padding: 4px 8px; border-radius: 999px;
        border: 1px solid rgba(255,255,255,.16);
        color: rgba(234,240,255,.85);
        white-space: nowrap;
      }
      .pill.ok { border-color: rgba(34,197,94,.55); }
      .pill.lock { border-color: rgba(148,163,184,.45); }
      .pill.now { border-color: rgba(56,189,248,.55); }

      .btnRow { display:flex; gap:10px; flex-wrap: wrap; margin-top: 12px; }
      button {
        border: 1px solid rgba(255,255,255,.16);
        background: rgba(255,255,255,.06);
        color: #eaf0ff;
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover { background: rgba(255,255,255,.10); }
      button.primary {
        border-color: rgba(34,197,94,.55);
        background: rgba(34,197,94,.12);
      }
      button.primary:hover { background: rgba(34,197,94,.18); }
      button.danger {
        border-color: rgba(244,63,94,.55);
        background: rgba(244,63,94,.10);
      }
      button.danger:hover { background: rgba(244,63,94,.16); }
      button:disabled { opacity: .5; cursor: not-allowed; }

      .section { margin-top: 14px; }
      .hr { height:1px; background: rgba(255,255,255,.12); margin: 16px 0; }

      textarea, input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.16);
        background: rgba(255,255,255,.04);
        color: #eaf0ff;
        outline: none;
      }
      textarea { min-height: 120px; resize: vertical; }

      details {
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.03);
        border-radius: 14px;
        padding: 10px 12px;
      }
      summary { cursor: pointer; font-weight: 700; }
      .note { font-size: 13px; color: rgba(234,240,255,.75); line-height: 1.4; }

      .badge {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.16);
        color: rgba(234,240,255,.85);
      }
      .footer { margin-top: 18px; color: rgba(234,240,255,.6); font-size: 12px; }
      code.inline { background: rgba(255,255,255,.08); padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const STORAGE_KEY = "it_english_b2_demo_v1";

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { completed: {}, submissions: {}, questions: [] };
          const parsed = JSON.parse(raw);
          return {
            completed: parsed.completed || {},
            submissions: parsed.submissions || {},
            questions: parsed.questions || [],
          };
        } catch {
          return { completed: {}, submissions: {}, questions: [] };
        }
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      const MODULES = [
        {
          id: "m1",
          title: "Modul 1 – IT alap kommunikáció",
          level: "A2→B1",
          goal: "Ticket szókincs + egyszerű hibaleírás angolul.",
          tasks: [
            {
              type: "gap",
              prompt: "Fill the gaps (1–2 words):\n1) The issue ____ when I click the login button.\n2) It works on my laptop but not on my ____.\n3) Please ____ a screenshot.",
              hint: "Tipikus IT szavak: occurs, phone, attach",
            },
            {
              type: "rewrite",
              prompt: "Rewrite professionally:\n“Not working!!! Fix it pls.”",
              hint: "Legyen udvarias + konkrét.",
            },
          ],
          sampleSolution:
`1) occurs
2) phone
3) attach

Rewrite (one good вариант):
“Hi, I’m unable to use the feature at the moment. The problem occurs when I click the login button. Could you please take a look? Thank you.”`
        },
        {
          id: "m2",
          title: "Modul 2 – Ticket & Support English",
          level: "B1",
          goal: "Present Perfect / Past Simple hibajegyekben + log szókincs.",
          tasks: [
            {
              type: "choose",
              prompt:
`Choose the correct option:
1) I (have restarted / restarted) the service twice today.
2) Yesterday the server (has returned / returned) a 500 error.
3) We (have not seen / did not see) this issue before.`,
              hint: "today = gyakran Present Perfect; yesterday = Past Simple",
            },
            {
              type: "short",
              prompt:
`Write a short ticket (5–7 sentences):
- what you expected
- what happened
- steps to reproduce
- environment (browser/OS)
- impact`,
              hint: "Használd: expected / actual / steps to reproduce / environment / impact",
            },
          ],
          sampleSolution:
`1) have restarted
2) returned
3) have not seen

Ticket example:
“Expected: The dashboard loads within 3 seconds.
Actual: It shows a blank page and the console reports a 500 error.
Steps to reproduce: 1) Log in 2) Open Dashboard.
Environment: Windows 11, Chrome 122.
Impact: I can’t access reports needed for today’s work.”`
        },
        {
          id: "m3",
          title: "Modul 3 – Meeting & együttműködés",
          level: "B1→B2",
          goal: "Clarification, agreeing/disagreeing, státusz update.",
          tasks: [
            {
              type: "phrases",
              prompt:
`Match the intent to a phrase:
A) Clarify
B) Politely disagree
C) Give an update

Phrases:
1) “Just to clarify, do you mean…?”
2) “I see your point, but I’m not sure that will work because…”
3) “Quick update: I’ve reproduced the issue and I’m investigating logs.”`,
              hint: "A=1, B=2, C=3",
            },
          ],
          sampleSolution:
`A-1
B-2
C-3

Extra:
- “Could you elaborate on that?”
- “Let’s align on the next steps.”`
        },
      ];

      function ProgressBar({ value }) {
        return (
          <div style={{marginTop: 8}}>
            <div className="note" style={{display:"flex", justifyContent:"space-between"}}>
              <span>Haladás</span><span>{Math.round(value)}%</span>
            </div>
            <div style={{
              height: 10, borderRadius: 999,
              background: "rgba(255,255,255,.08)",
              border: "1px solid rgba(255,255,255,.12)",
              overflow: "hidden",
              marginTop: 6
            }}>
              <div style={{height:"100%", width: `${value}%`, background:"rgba(56,189,248,.45)"}} />
            </div>
          </div>
        );
      }

      function App() {
        const [state, setState] = React.useState(loadState());
        const [activeId, setActiveId] = React.useState(MODULES[0].id);
        const [submissionText, setSubmissionText] = React.useState("");
        const [question, setQuestion] = React.useState("");

        React.useEffect(() => saveState(state), [state]);

        const completedCount = MODULES.filter(m => state.completed[m.id]).length;
        const progress = (completedCount / MODULES.length) * 100;

        function isUnlocked(moduleIndex) {
          if (moduleIndex === 0) return true;
          const prev = MODULES[moduleIndex - 1];
          return !!state.completed[prev.id];
        }

        function statusPill(moduleIndex, moduleId) {
          if (!isUnlocked(moduleIndex)) return <span className="pill lock">ZÁRT</span>;
          if (state.completed[moduleId]) return <span className="pill ok">KÉSZ</span>;
          if (moduleId === activeId) return <span className="pill now">AKTÍV</span>;
          return <span className="pill">NYITVA</span>;
        }

        const activeIndex = MODULES.findIndex(m => m.id === activeId);
        const active = MODULES[activeIndex];
        const unlocked = isUnlocked(activeIndex);
        const completed = !!state.completed[activeId];
        const hasSubmitted = !!state.submissions[activeId];

        React.useEffect(() => {
          // ha aktív modul zárt, ugorjunk az első elérhetőre
          if (!unlocked) {
            const firstOpen = MODULES.find((m, i) => isUnlocked(i));
            if (firstOpen) setActiveId(firstOpen.id);
          }
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [activeId, state.completed]);

        function submitWork() {
          const text = submissionText.trim();
          if (!text) return;

          setState(prev => ({
            ...prev,
            submissions: {
              ...prev.submissions,
              [activeId]: { text, at: new Date().toISOString() },
            },
          }));
          setSubmissionText("");
        }

        function markCompleted() {
          // demo: beadás után engedjük a "kész" státuszt
          if (!state.submissions[activeId]) return;

          setState(prev => ({
            ...prev,
            completed: { ...prev.completed, [activeId]: true },
          }));
        }

        function resetAll() {
          localStorage.removeItem(STORAGE_KEY);
          setState({ completed: {}, submissions: {}, questions: [] });
          setActiveId(MODULES[0].id);
        }

        function sendQuestion() {
          const q = question.trim();
          if (!q) return;
          setState(prev => ({
            ...prev,
            questions: [
              { moduleId: activeId, text: q, at: new Date().toISOString() },
              ...prev.questions,
            ],
          }));
          setQuestion("");
          alert("Köszi! (Demo) A kérdés elmentve localStorage-be.");
        }

        return (
          <div className="wrap">
            <div className="topbar">
              <div className="brand">
                <div className="logo" aria-hidden="true"></div>
                <div>
                  <div className="title">IT English B2 – Platform (GitHub Pages demo)</div>
                  <div className="muted">
                    Modulok akkor nyílnak, ha az előzőt “kész”-nek jelölöd (beadás után).
                  </div>
                </div>
              </div>

              <div style={{display:"flex", gap:10, alignItems:"center"}}>
                <span className="badge">{completedCount}/{MODULES.length} modul kész</span>
                <button className="danger" onClick={resetAll} title="Minden törlése (localStorage)">
                  Reset
                </button>
              </div>
            </div>

            <ProgressBar value={progress} />

            <div className="grid">
              <div className="card">
                <h3>Modulok</h3>
                <div className="note">
                  Tipp: kattints egy nyitott modulra. Zárt modult csak akkor tudsz megnyitni,
                  ha az előző modul <span className="inline code">KÉSZ</span>.
                </div>

                <div className="hr"></div>

                <div className="list">
                  {MODULES.map((m, i) => {
                    const unlockedHere = isUnlocked(i);
                    return (
                      <div
                        key={m.id}
                        className="item"
                        aria-disabled={!unlockedHere}
                        onClick={() => {
                          if (!unlockedHere) return;
                          setActiveId(m.id);
                        }}
                      >
                        <div>
                          <div style={{fontWeight: 800}}>{m.title}</div>
                          <div className="muted">{m.goal}</div>
                          <div className="muted">Szint: {m.level}</div>
                        </div>
                        <div>{statusPill(i, m.id)}</div>
                      </div>
                    );
                  })}
                </div>

                <div className="footer">
                  Megjegyzés: ez egy egylapos demo. Éles rendszerben a “Beadás” menne backendbe,
                  és a mintamegoldás lehetne “csak előfizetőknek”.
                </div>
              </div>

              <div className="card">
                <h3>{active.title}</h3>
                <div className="note">{active.goal}</div>

                {!unlocked && (
                  <div className="section note" style={{marginTop: 12}}>
                    Ez a modul még zárt. Fejezd be az előzőt, és automatikusan nyílik.
                  </div>
                )}

                {unlocked && (
                  <>
                    <div className="section">
                      <h3 style={{marginTop: 0}}>Feladatok</h3>
                      <div className="note">Írd meg a megoldást, majd add le.</div>

                      <div style={{display:"flex", flexDirection:"column", gap: 12, marginTop: 10}}>
                        {active.tasks.map((t, idx) => (
                          <details key={idx}>
                            <summary>Feladat {idx + 1}</summary>
                            <pre style={{
                              whiteSpace:"pre-wrap",
                              fontFamily:"ui-monospace, SFMono-Regular, Menlo, monospace",
                              fontSize: 13,
                              color: "rgba(234,240,255,.92)"
                            }}>
{t.prompt}
                            </pre>
                            <div className="note">Hint: {t.hint}</div>
                          </details>
                        ))}
                      </div>
                    </div>

                    <div className="hr"></div>

                    <div className="section">
                      <h3>Beadás</h3>
                      <div className="note">
                        Demo: ide bemásolod a megoldást (valódi platformon lehetne fájlfeltöltés / űrlap / automata teszt).
                      </div>

                      <textarea
                        placeholder="Ide írd a megoldásod…"
                        value={submissionText}
                        onChange={(e) => setSubmissionText(e.target.value)}
                        style={{marginTop: 10}}
                      />

                      <div className="btnRow">
                        <button className="primary" onClick={submitWork} disabled={!submissionText.trim()}>
                          Megoldás leadása
                        </button>
                        <button onClick={markCompleted} disabled={!state.submissions[activeId]}>
                          Modul kész (nyitja a következőt)
                        </button>
                      </div>

                      <div className="note" style={{marginTop: 10}}>
                        Státusz:{" "}
                        {hasSubmitted ? <span className="pill ok">BEADVA</span> : <span className="pill lock">NINCS BEADÁS</span>}
                        {" "}
                        {completed ? <span className="pill ok">KÉSZ</span> : <span className="pill">FOLYAMATBAN</span>}
                      </div>
                    </div>

                    <div className="hr"></div>

                    <div className="section">
                      <h3>Részletes mintamegoldás</h3>
                      <div className="note">
                        Demo logika: a mintamegoldás akkor látszik, ha van beadás.
                        (Élesben lehetne “beadás + előfizetés” feltétel.)
                      </div>

                      {hasSubmitted ? (
                        <pre style={{
                          whiteSpace:"pre-wrap",
                          fontFamily:"ui-monospace, SFMono-Regular, Menlo, monospace",
                          fontSize: 13,
                          padding: 12,
                          borderRadius: 14,
                          border: "1px solid rgba(255,255,255,.12)",
                          background: "rgba(255,255,255,.03)",
                          marginTop: 10
                        }}>
{active.sampleSolution}
                        </pre>
                      ) : (
                        <div className="note" style={{marginTop: 10}}>
                          Add le a megoldást, és megjelenik a mintamegoldás.
                        </div>
                      )}
                    </div>

                    <div className="hr"></div>

                    <div className="section">
                      <h3>Kérdésed van? Írj</h3>
                      <div className="note">
                        Írd le, hol akadtál el (feladat + mondatszám), és másold ide a próbálkozásod. (Demo: mentés localStorage-be.)
                      </div>

                      <input
                        placeholder="Pl.: Modul 2 / Feladat 1 / 3. mondat – miért nem Past Simple?"
                        value={question}
                        onChange={(e) => setQuestion(e.target.value)}
                        style={{marginTop: 10}}
                      />
                      <div className="btnRow">
                        <button onClick={sendQuestion} disabled={!question.trim()}>
                          Kérdés elküldése
                        </button>
                      </div>

                      {state.questions.length > 0 && (
                        <details style={{marginTop: 12}}>
                          <summary>Mentett kérdéseid (demo)</summary>
                          <div style={{display:"flex", flexDirection:"column", gap: 10, marginTop: 10}}>
                            {state.questions.slice(0, 5).map((q, i) => (
